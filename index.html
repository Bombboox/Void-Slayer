<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Slayer</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      background: #07080d;
      overflow: hidden;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #ui {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 12px;
      color: #9fb4d8;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <canvas id="ui"></canvas>
  <div id="hud"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
